                    &lt;div class=&quot;space-y-3 mb-6&quot;&gt;
                        ${q.options.map((opt, idx) =&gt; {
                            let classes = 'option-card bg-white border-2 border-gray-300 rounded-xl p-4';
                            if (isAnswered) {
                                classes += ' disabled';
                                if (idx === answer.selected) {
                                    classes += answer.correct ? ' correct' : ' incorrect';
                                }
                                if (idx === q.correct &amp;&amp; !answer.correct) {
                                    classes += ' correct';
                                }
                            }
                            return `
                                &lt;div class=&quot;${classes}&quot; onclick=&quot;app.selectAnswer(${idx})&quot;&gt;
                                    &lt;div class=&quot;flex items-center justify-between&quot;&gt;
                                        &lt;span class=&quot;text-gray-800&quot;&gt;${opt}&lt;/span&gt;
                                        ${isAnswered &amp;&amp; idx === answer.selected ? 
                                            (answer.correct ? '&lt;span class=&quot;text-2xl&quot;&gt;✓&lt;/span&gt;' : '&lt;span class=&quot;text-2xl&quot;&gt;✗&lt;/span&gt;') : ''}
                                        ${isAnswered &amp;&amp; idx === q.correct &amp;&amp; !answer.correct ? '&lt;span class=&quot;text-2xl&quot;&gt;✓&lt;/span&gt;' : ''}
                                    &lt;/div&gt;
                                &lt;/div&gt;
                            `;
                        }).join('')}
                    &lt;/div&gt;

                    ${isAnswered ? `
                        &lt;div class=&quot;bg-${answer.correct ? 'correct' : 'incorrect'}/10 border-2 border-${answer.correct ? 'correct' : 'incorrect'} rounded-xl p-6&quot;&gt;
                            &lt;h4 class=&quot;font-bold text-lg mb-2&quot;&gt;${answer.correct ? '✓ Correct!' : '✗ Incorrect'}&lt;/h4&gt;
                            &lt;p class=&quot;text-gray-700&quot;&gt;${q.explanation}&lt;/p&gt;
                        &lt;/div&gt;
                    ` : ''}
                `;

                // 更新进度
                app.updateProgress();

                // 更新导航按钮
                document.getElementById('btn-prev').disabled = app.currentQuestion === 0;
                document.getElementById('btn-next').textContent = 
                    app.currentQuestion === quizData.length - 1 ? 'Finish &rarr;' : 'Next &rarr;';
            },

            selectAnswer: (idx) =&gt; {
                const answer = app.answers[app.currentQuestion];
                if (answer.selected !== null) return; // 已回答

                const q = quizData[app.currentQuestion];
                answer.selected = idx;
                answer.correct = idx === q.correct;
                answer.timestamp = new Date().toISOString();

                app.renderQuestion();
            },

            updateProgress: () =&gt; {
                const answered = app.answers.filter(a =&gt; a.selected !== null).length;
                const correct = app.answers.filter(a =&gt; a.correct).length;
                const percentage = (answered / quizData.length) * 100;
                const score = answered &gt; 0 ? Math.round((correct / answered) * 100) : 0;

                document.getElementById('progress-bar').style.width = percentage + '%';
                document.getElementById('progress-text').textContent = `${answered}/${quizData.length}`;
                document.getElementById('score-display').textContent = `${correct}/${answered}`;
                document.getElementById('current-score').textContent = score + '%';
            },

            nextQuestion: () =&gt; {
                if (app.currentQuestion &lt; quizData.length - 1) {
                    app.currentQuestion++;
                    app.renderQuestion();
                    window.scrollTo(0, 0);
                } else {
                    app.finishQuiz();
                }
            },

            prevQuestion: () =&gt; {
                if (app.currentQuestion &gt; 0) {
                    app.currentQuestion--;
                    app.renderQuestion();
                    window.scrollTo(0, 0);
                }
            },

            finishQuiz: () =&gt; {
                app.endTime = new Date().toISOString();
                const correct = app.answers.filter(a =&gt; a.correct).length;
                const total = quizData.length;
                const percentage = Math.round((correct / total) * 100);

                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');

                document.getElementById('final-score').textContent = percentage + '%';
                document.getElementById('correct-count').textContent = correct;
                document.getElementById('incorrect-count').textContent = total - correct;
                document.getElementById('total-count').textContent = total;

                let message = '';
                if (percentage &gt;= 90) message = 'Outstanding! You truly understand Romeo and Juliet! 🌟';
                else if (percentage &gt;= 80) message = 'Excellent work! You have a strong grasp of the play! 👏';
                else if (percentage &gt;= 70) message = 'Good job! Keep studying to master the details! 📚';
                else if (percentage &gt;= 60) message = 'Not bad! Review the material to improve your score. 💪';
                else message = 'Keep practicing! Review the play and try again. 🎭';
                document.getElementById('final-message').textContent = message;

                // 生成提交代码
                const submission = {
                    name: app.studentName,
                    startTime: app.startTime,
                    endTime: app.endTime,
                    answers: app.answers,
                    score: { correct, total, percentage }
                };
                const code = btoa(JSON.stringify(submission));
                document.getElementById('submission-code').textContent = code;

                window.scrollTo(0, 0);
            },

            copyCode: () =&gt; {
                const code = document.getElementById('submission-code').textContent;
                navigator.clipboard.writeText(code).then(() =&gt; {
                    alert('Code copied! Send it to your teacher.');
                });
            },

            reviewAnswers: () =&gt; {
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                app.currentQuestion = 0;
                app.renderQuestion();
            },

            decodeSubmission: () =&gt; {
                const code = document.getElementById('teacher-code-input').value.trim();
                if (!code) {
                    alert('Please paste a student code!');
                    return;
                }

                try {
                    const submission = JSON.parse(atob(code));
                    app.renderTeacherReport(submission);
                } catch (e) {
                    alert('Invalid code! Please check and try again.');
                }
            },

            renderTeacherReport: (submission) =&gt; {
                const { name, startTime, endTime, answers, score } = submission;
                const duration = Math.round((new Date(endTime) - new Date(startTime)) / 60000);

                const resultsDiv = document.getElementById('teacher-results');
                resultsDiv.classList.remove('hidden');

                let html = `
                    &lt;div class=&quot;bg-bg p-6 rounded-xl mb-6&quot;&gt;
                        &lt;h3 class=&quot;text-2xl font-bold mb-4&quot;&gt;📊 Student Report&lt;/h3&gt;
                        &lt;div class=&quot;grid grid-cols-2 gap-4&quot;&gt;
                            &lt;div&gt;&lt;strong&gt;Name:&lt;/strong&gt; ${name}&lt;/div&gt;
                            &lt;div&gt;&lt;strong&gt;Score:&lt;/strong&gt; ${score.correct}/${score.total} (${score.percentage}%)&lt;/div&gt;
                            &lt;div&gt;&lt;strong&gt;Started:&lt;/strong&gt; ${new Date(startTime).toLocaleString()}&lt;/div&gt;
                            &lt;div&gt;&lt;strong&gt;Duration:&lt;/strong&gt; ${duration} minutes&lt;/div&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;div class=&quot;space-y-4&quot;&gt;
                        &lt;h3 class=&quot;text-xl font-bold&quot;&gt;Detailed Answers:&lt;/h3&gt;
                `;

                answers.forEach((ans, idx) =&gt; {
                    const q = quizData[idx];
                    const status = ans.correct ? 'correct' : 'incorrect';
                    html += `
                        &lt;div class=&quot;border-2 border-${status} rounded-xl p-4 bg-${status}/5&quot;&gt;
                            &lt;div class=&quot;flex items-start justify-between mb-2&quot;&gt;
                                &lt;div class=&quot;font-bold&quot;&gt;Q${q.id}: ${q.part}&lt;/div&gt;
                                &lt;div class=&quot;text-2xl&quot;&gt;${ans.correct ? '✓' : '✗'}&lt;/div&gt;
                            &lt;/div&gt;
                            &lt;p class=&quot;text-sm text-gray-700 mb-2&quot;&gt;${q.question}&lt;/p&gt;
                            &lt;div class=&quot;text-sm&quot;&gt;
                                &lt;div&gt;&lt;strong&gt;Student Answer:&lt;/strong&gt; ${q.options[ans.selected]}&lt;/div&gt;
                                ${!ans.correct ? `&lt;div class=&quot;text-correct&quot;&gt;&lt;strong&gt;Correct Answer:&lt;/strong&gt; ${q.options[q.correct]}&lt;/div&gt;` : ''}
                            &lt;/div&gt;
                        &lt;/div&gt;
                    `;
                });

                html += '&lt;/div&gt;';
                resultsDiv.innerHTML = html;
            }
        };

        // 初始化
        window.onload = () =&gt; {
            app.showMode('student');
        };
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击立即体验的埋点
     */

      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
